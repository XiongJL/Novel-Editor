appId: com.noveleditor.app
productName: "云梦小说编辑器"
copyright: "Copyright 2026"

directories:
  output: release
  buildResources: build

compression: maximum

extraResources:
  - from: build/icon_ink_pen_256.ico
    to: icon_ink_pen_256.ico
  - from: scripts/novel-editor-mcp.mjs
    to: mcp/novel-editor-mcp.mjs
  - from: scripts/novel-editor-mcp.cmd
    to: mcp/novel-editor-mcp.cmd

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/adm-zip/**/*
  - node_modules/@novel-editor/core/package.json
  - node_modules/@novel-editor/core/dist/**/*
  - node_modules/@novel-editor/core/generated/client/index.js
  - node_modules/@novel-editor/core/generated/client/package.json
  - node_modules/@novel-editor/core/generated/client/*query_engine*.node
  - node_modules/@novel-editor/core/generated/client/schema-init.sql
  - node_modules/@novel-editor/core/generated/client/schema.prisma
  - node_modules/@novel-editor/core/generated/client/runtime/library.js
  - "!node_modules/@novel-editor/core/node_modules{,/**/*}"
  - "!node_modules/@novel-editor/core/.turbo{,/**/*}"
  - "!node_modules/@novel-editor/core/prisma{,/**/*}"
  - "!node_modules/@novel-editor/core/scripts{,/**/*}"
  - "!node_modules/@novel-editor/core/src{,/**/*}"
  - "!node_modules/@novel-editor/core/.env"
  - "!node_modules/@novel-editor/core/pnpm-lock.yaml"
  - "!node_modules/@novel-editor/core/tsconfig.json"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: icon_ink_pen_256.ico
  sign: null
  signAndEditExecutable: true

mac:
  target:
    - target: dmg
      arch:
        - universal
  icon: icon_ink_pen_512.icns
  artifactName: "${productName}-mac-${version}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "${productName}"
  installerIcon: icon_ink_pen_256.ico
  uninstallerIcon: icon_ink_pen_256.ico
  installerHeaderIcon: icon_ink_pen_256.ico
  artifactName: "${productName}-Setup-${version}.${ext}"
  include: build/installer.nsh
  deleteAppDataOnUninstall: false

portable:
  artifactName: "${productName}-Portable-${version}.${ext}"

asar: true
asarUnpack:
  - "node_modules/@novel-editor/core/generated/client/*.node"

electronLanguages:
  - en-US
  - zh-CN
