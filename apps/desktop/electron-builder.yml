appId: com.noveleditor.app
productName: 云梦小说编辑器
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/@prisma/**/*
  - node_modules/.prisma/**/*
  - node_modules/@prisma/client/.prisma/**/*
  - node_modules/@novel-editor/core/node_modules/.prisma/**/*
  - node_modules/@novel-editor/**/*
  - node_modules/@novel-editor/core/node_modules/@prisma/client/.prisma/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon_ink_pen_256.ico
  sign: null
  signAndEditExecutable: false

mac:
  icon: build/icon_ink_pen_512.icns

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 云梦编辑器
  artifactName: ${productName}-Setup-${version}.${ext}

portable:
  artifactName: ${productName}-Portable-${version}.${ext}

asar: false
asarUnpack:
  - "**/*.node"
  - "**/node_modules/.prisma/**/*"
  - "**/node_modules/@prisma/client/.prisma/**/*"
  - "**/node_modules/@prisma/client/**/*"
  - "**/node_modules/@novel-editor/core/node_modules/.prisma/**/*"
  - "**/node_modules/@novel-editor/core/node_modules/@prisma/client/.prisma/**/*"
  - "**/node_modules/@novel-editor/core/node_modules/@prisma/client/**/*"
  - "**/node_modules/@prisma/engines/**/*"
