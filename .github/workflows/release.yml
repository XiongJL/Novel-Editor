name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"

  build-windows:
    name: Build Windows
    needs:
      - prepare-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync package versions from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="$VERSION" node <<'NODE'
          const fs = require('fs');
          for (const file of ['package.json', 'apps/desktop/package.json']) {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            data.version = process.env.VERSION;
            fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n');
          }
          NODE

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          npm install -g pnpm@8.15.9
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows artifacts
        run: pnpm --filter novel-editor-desktop run build:win

      - name: Upload Windows assets to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $stageDir = Join-Path $env:RUNNER_TEMP "release-upload-windows"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          $files = Get-ChildItem apps/desktop/release -File | Where-Object {
            $_.Name -like '*Setup-*.exe' -or
            $_.Name -like '*Portable-*.exe' -or
            $_.Name -like '*Setup-*.exe.blockmap'
          } | ForEach-Object {
            $targetName = switch -Wildcard ($_.Name) {
              '*Setup-*.exe.blockmap' { "novel-editor-setup-$version.exe.blockmap"; break }
              '*Setup-*.exe' { "novel-editor-setup-$version.exe"; break }
              '*Portable-*.exe' { "novel-editor-portable-$version.exe"; break }
              default { throw "Unexpected Windows asset: $($_.Name)" }
            }

            $targetPath = Join-Path $stageDir $targetName
            Copy-Item $_.FullName $targetPath -Force
            "$targetPath#$($_.Name)"
          }

          if (-not $files) {
            throw "No Windows release assets found."
          }

          gh release upload $env:GITHUB_REF_NAME $files --clobber

  build-macos:
    name: Build macOS
    needs:
      - prepare-release
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync package versions from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="$VERSION" node <<'NODE'
          const fs = require('fs');
          for (const file of ['package.json', 'apps/desktop/package.json']) {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            data.version = process.env.VERSION;
            fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n');
          }
          NODE

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          npm install -g pnpm@8.15.9
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS artifacts
        run: pnpm --filter novel-editor-desktop run build:mac

      - name: Upload macOS assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          version="${GITHUB_REF_NAME#v}"
          stage_dir="${RUNNER_TEMP}/release-upload-macos"
          mkdir -p "$stage_dir"
          files=(
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest*.yml
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "No macOS release assets found." >&2
            exit 1
          fi

          labeled_files=()
          for file in "${files[@]}"; do
            base="$(basename "$file")"
            case "$base" in
              *.dmg.blockmap)
                target_name="novel-editor-mac-${version}.dmg.blockmap"
                ;;
              *.dmg)
                target_name="novel-editor-mac-${version}.dmg"
                ;;
              *.zip)
                target_name="novel-editor-mac-${version}.zip"
                ;;
              latest*.yml)
                target_name="$base"
                ;;
              *)
                echo "Unexpected macOS asset: $base" >&2
                exit 1
                ;;
            esac

            target_path="${stage_dir}/${target_name}"
            cp "$file" "$target_path"
            labeled_files+=("${target_path}#${base}")
          done

          gh release upload "$GITHUB_REF_NAME" "${labeled_files[@]}" --clobber
